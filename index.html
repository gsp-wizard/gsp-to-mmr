<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP to MMR</title>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #26262b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: #374151;
            --elite-gold: #fbbf24;
            --highlight-blue: #60a5fa;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 0 20px; 
            color: var(--text-main); 
            background-color: var(--bg-primary);
            line-height: 1.5;
        }

        h2 { font-size: 1.75rem; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        label { display: block; margin-top: 1.25rem; font-weight: 500; font-size: 0.875rem; color: var(--text-main); }
        
        input { 
            width: 100%; 
            padding: 10px 14px; 
            margin-top: 6px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            background-color: var(--bg-secondary);
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .input-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-style: italic;
            line-height: 1.4;
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            margin-top: 24px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.15s ease;
        }
        button:hover { background: var(--accent-hover); }
        
        #results { 
            margin-top: 30px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border); 
        }
        
        h3, h4 { margin-top: 0; }
        h4 { margin-bottom: 4px; }

        .disclaimer {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 12px;
        }

        .match-card { 
            border-left: 4px solid var(--success); 
            padding: 10px 0 10px 15px; 
            margin-bottom: 15px; 
            background: var(--bg-tertiary);
            border-radius: 0 8px 8px 0;
        }

        .elite-card {
            border-left: 4px solid var(--elite-gold);
            padding: 12px 15px;
            margin: 15px 0;
            background: #2e2516;
            border-radius: 0 8px 8px 0;
            font-weight: 600;
        }
        .elite-card span {
            color: var(--elite-gold);
            font-size: 1.15rem;
            display: block;
            margin-top: 2px;
        }

        .highlight-card {
            border-left: 4px solid var(--highlight-blue);
            padding: 12px 15px;
            margin: 15px 0;
            background: #1c2536;
            border-radius: 0 8px 8px 0;
        }
        .highlight-card h4 {
            color: var(--highlight-blue);
            margin-bottom: 6px;
        }
        .highlight-item {
            font-size: 0.95rem;
            margin-bottom: 4px;
            font-family: monospace;
        }
        .highlight-item:last-child {
            margin-bottom: 0;
        }

        .error { color: var(--error); font-weight: 600; }
        
        textarea { 
            width: 100%; 
            height: 250px; 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
            background-color: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .version-badge {
            display: block;
            text-align: center;
            margin-top: 50px;
            font-size: 0.75rem;
            color: #374151;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h2>GSP to MMR</h2>
    <p>Enter <em>exact</em> current gsp values of 2-3 characters.</p>

    <label for="gsp1">Observed GSP 1:</label>
    <input type="number" id="gsp1" value="15247277">

    <label for="gsp2">Observed GSP 2:</label>
    <input type="number" id="gsp2" value="16107350">

    <label for="gsp3">Observed GSP 3 (Optional):</label>
    <input type="number" id="gsp3" placeholder="e.g., 8813077">
    <div class="input-hint">Use a 3rd one if you find multiple matching curves. If you still get multiple matches, try using GSPs that are more spread out.</div>

    <button type="button" id="searchBtn">Find Matching GSP Curve</button>

    <div id="results"></div>

    <div class="version-badge">App Version: 1.7.2</div>

    <script>
        function stdNormCDF(x) {
            var t = 1 / (1 + 0.2316419 * Math.abs(x));
            var d = 0.3989422804014327 * Math.exp(-x * x / 2);
            var p = d * t * (0.31938153 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
            return x >= 0 ? 1 - p : p;
        }

        function normCDF(x, mean, stdDev) {
            return stdNormCDF((x - mean) / stdDev);
        }

        function calculateGSP(t, mmr, norm600, norm1400) {
            var baseVal = 1995587;
            var tMod = Math.floor((t - 481) / 49);
            
            if (mmr <= 599) {
                var gsp600 = baseVal + (16058300 + 100 * t - baseVal) * norm600;
                var slopeB = 248.831 + tMod * 0.07619047619;
                return gsp600 - (600 - mmr) * slopeB;
            } else if (mmr >= 1401) {
                var gsp1400 = baseVal + (16058300 + 100 * t - baseVal) * norm1400;
                var slopeT = 220.60524 + tMod * 0.0671156;
                return gsp1400 + (mmr - 1400) * slopeT;
            } else {
                var normDist = normCDF(mmr, 1000, 110);
                return baseVal + (16058300 + 100 * t - baseVal) * normDist;
            }
        }

        document.getElementById('searchBtn').addEventListener('click', function() {
            console.clear();
            console.log("🚀 Click detected. Script execution started...");

            var startT = 2000;
            var gsp1Input = document.getElementById('gsp1').value;
            var gsp2Input = document.getElementById('gsp2').value;
            var gsp3Input = document.getElementById('gsp3').value;

            if (!gsp1Input || !gsp2Input) {
                alert("Please enter at least the first two GSP values.");
                return;
            }

            var observedGSPs = [parseFloat(gsp1Input), parseFloat(gsp2Input)];
            var checkThird = false;
            if (gsp3Input.trim() !== "") {
                observedGSPs.push(parseFloat(gsp3Input));
                checkThird = true;
            }

            var tolerance = 1.5; 
            var maxSteps = 5000;

            var resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<span style="color: var(--text-muted)">Scanning 10,000 curves asynchronously...</span>';

            var norm600 = normCDF(600, 1000, 110);
            var norm1400 = normCDF(1400, 1000, 110);

            var tSequence = [startT];
            for (var step = 1; step <= maxSteps; step++) {
                tSequence.push(startT + step);
                tSequence.push(startT - step);
            }

            var matches = [];
            var matchedMMRMapping = {}; 
            var currentIndex = 0;
            var chunkCount = 200; 

            function processChunk() {
                var endIndex = Math.min(currentIndex + chunkCount, tSequence.length);

                for (var i = currentIndex; i < endIndex; i++) {
                    var t = tSequence[i];
                    var matchedObserved = new Set();
                    var localMmrMap = {};
                    
                    for (var mmr = 100; mmr <= 2200; mmr++) {
                        var gspCalc = calculateGSP(t, mmr, norm600, norm1400);
                        
                        var diff1 = Math.abs(gspCalc - observedGSPs[0]);
                        var diff2 = Math.abs(gspCalc - observedGSPs[1]);

                        if (diff1 <= tolerance) {
                            matchedObserved.add(0);
                            localMmrMap[observedGSPs[0]] = mmr;
                        }
                        if (diff2 <= tolerance) {
                            matchedObserved.add(1);
                            localMmrMap[observedGSPs[1]] = mmr;
                        }

                        if (checkThird) {
                            var diff3 = Math.abs(gspCalc - observedGSPs[2]);
                            if (diff3 <= tolerance) {
                                matchedObserved.add(2);
                                localMmrMap[observedGSPs[2]] = mmr;
                            }
                        }
                    }

                    if (matchedObserved.size === observedGSPs.length) {
                        matches.push(t);
                        if (matches.length === 1) {
                            matchedMMRMapping = localMmrMap;
                        }
                    }
                }

                currentIndex = endIndex;

                if (currentIndex < tSequence.length) {
                    requestAnimationFrame(processChunk);
                } else {
                    renderFinalResults();
                }
            }

            function renderFinalResults() {
                if (matches.length === 0) {
                    resultsDiv.innerHTML = '<span class="error">No matching curves found within range. Ensure values are exact.</span>';
                    return;
                }

                var htmlOutput = '<h3>Found ' + matches.length + ' Match(es):</h3>';
                matches.forEach(function(t) {
                    htmlOutput += '<div class="match-card"><strong>👉 Match Found at t = ' + t + '</strong></div>';
                });

                var targetT = matches[0];
                var eliteGSP = calculateGSP(targetT, 1142, norm600, norm1400);

                htmlOutput += '<div class="highlight-card">';
                htmlOutput += '<h4>🔍 Your Entered GSP Mappings:</h4>';
                observedGSPs.forEach(function(gsp) {
                    var mmrVal = matchedMMRMapping[gsp] !== undefined ? matchedMMRMapping[gsp] : "Not found";
                    htmlOutput += '<div class="highlight-item"><b>GSP ' + gsp.toLocaleString() + '</b> ➔ MMR ' + mmrVal + '</div>';
                });
                htmlOutput += '</div>';

                htmlOutput += '<div class="elite-card">✨ Elite Smash Entry Point (MMR=1142):<span>GSP: ' + Number(eliteGSP.toFixed(0)).toLocaleString() + '</span></div>';
                htmlOutput += '<h4>Generated GSP values for t = ' + targetT + ':</h4>';
                htmlOutput += '<div class="disclaimer">*Actual GSP values will be ±1 of these numbers.</div>';
                htmlOutput += '<textarea readonly>';
                
                for (var mmr = 2200; mmr >= 100; mmr--) {
                    var finalGSP = Math.round(calculateGSP(targetT, mmr, norm600, norm1400));
                    htmlOutput += 'MMR=' + mmr + ': GSP=' + finalGSP.toLocaleString() + '\n';
                }
                htmlOutput += '</textarea>';

                resultsDiv.innerHTML = htmlOutput;
            }

            requestAnimationFrame(processChunk);
        });
    </script>
</body>
</html>
