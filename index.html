<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP to MMR</title>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #26262b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: #374151;
            --elite-gold: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 0 20px; 
            color: var(--text-main); 
            background-color: var(--bg-primary);
            line-height: 1.5;
        }

        h2 { font-size: 1.75rem; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        label { display: block; margin-top: 1.25rem; font-weight: 500; font-size: 0.875rem; color: var(--text-main); }
        
        input { 
            width: 100%; 
            padding: 10px 14px; 
            margin-top: 6px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            background-color: var(--bg-secondary);
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            margin-top: 24px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.15s ease;
        }
        button:hover { background: var(--accent-hover); }
        
        #results { 
            margin-top: 30px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border); 
        }
        
        h3, h4 { margin-top: 0; }

        .match-card { 
            border-left: 4px solid var(--success); 
            padding: 10px 0 10px 15px; 
            margin-bottom: 15px; 
            background: var(--bg-tertiary);
            border-radius: 0 8px 8px 0;
        }

        .elite-card {
            border-left: 4px solid var(--elite-gold);
            padding: 12px 15px;
            margin: 20px 0;
            background: #2e2516;
            border-radius: 0 8px 8px 0;
            font-weight: 600;
        }
        .elite-card span {
            color: var(--elite-gold);
            font-size: 1.15rem;
            display: block;
            margin-top: 2px;
        }

        .error { color: var(--error); font-weight: 600; }
        
        textarea { 
            width: 100%; 
            height: 250px; 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
            background-color: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h2>GSP to MMR</h2>
    <p>Enter <em>exact</em> current gsp values of two characters.</p>

    <label for="gsp1">Observed GSP 1:</label>
    <input type="number" id="gsp1" value="16147639">

    <label for="gsp2">Observed GSP 2:</label>
    <input type="number" id="gsp2" value="16216751">

    <button type="button" id="searchBtn">Find Matching GSP Curve</button>

    <div id="results"></div>

    <script>
        // High-precision error function calculation for exact normal distributions
        function erf(x) {
            const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
            const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
            const sign = x < 0 ? -1 : 1;
            const absX = Math.abs(x);
            const t = 1.0 / (1.0 + p * absX);
            const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-absX * absX);
            return sign * y;
        }

        function normCDF(x, mean, stdDev) {
            return 0.5 * (1.0 + erf((x - mean) / (stdDev * Math.sqrt(2))));
        }

        function calculateGSP(t, mmr, norm600, norm1400) {
            const baseVal = 1995587;
            const tMod = Math.floor((t - 481) / 49);
            
            if (mmr <= 599) {
                const gsp600 = baseVal + (16058300 + 100 * t - baseVal) * norm600;
                const slopeB = 248.831 + tMod * 0.07619047619;
                return gsp600 - (600 - mmr) * slopeB;
            } else if (mmr >= 1401) {
                const gsp1400 = baseVal + (16058300 + 100 * t - baseVal) * norm1400;
                const slopeT = 220.605 + tMod * 0.0670995671;
                return gsp1400 + (mmr - 1400) * slopeT;
            } else {
                const normDist = normCDF(mmr, 1000, 110);
                return baseVal + (16058300 + 100 * t - baseVal) * normDist;
            }
        }

        document.getElementById('searchBtn').addEventListener('click', function() {
            console.clear();
            console.log("🚀 Initialization starting...");
            
            const startT = 2000;
            const gsp1Input = document.getElementById('gsp1').value;
            const gsp2Input = document.getElementById('gsp2').value;

            if (!gsp1Input || !gsp2Input) {
                alert("Please enter both GSP values.");
                return;
            }

            const observedGSPs = [parseFloat(gsp1Input), parseFloat(gsp2Input)];
            const tolerance = 1.5; 
            const maxSteps = 5000;

            console.log("Parameters Captured -> Targets:", observedGSPs, "Tolerance:", tolerance);

            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<span style="color: var(--text-muted)">Scanning 10,000 curves... Check dev console for diagnostics.</span>';

            setTimeout(() => {
                const norm600 = normCDF(600, 1000, 110);
                const norm1400 = normCDF(1400, 1000, 110);
                console.log(`Pre-calculated CDF Anchors -> norm600: ${norm600.toFixed(6)}, norm1400: ${norm1400.toFixed(6)}`);

                let tSequence = [startT];
                for (let step = 1; step <= maxSteps; step++) {
                    tSequence.push(startT + step);
                    tSequence.push(startT - step);
                }

                let matches = [];
                let minObservedDiff1 = Infinity;
                let minObservedDiff2 = Infinity;
                let bestTForGSP1 = null;
                let bestTForGSP2 = null;

                console.log(`Starting loop execution over ${tSequence.length} values of T...`);

                for (let i = 0; i < tSequence.length; i++) {
                    let t = tSequence[i];
                    let matchedObserved = new Set();
                    
                    // Diagnostic dump for the original starting position
                    if (i === 0) {
                        console.log(`Sample Calculation at T = 2000:`);
                        console.log(`  -> GSP at MMR=600: ${calculateGSP(t, 600, norm600, norm1400)}`);
                        console.log(`  -> GSP at MMR=1000: ${calculateGSP(t, 1000, norm600, norm1400)}`);
                        console.log(`  -> GSP at MMR=1400: ${calculateGSP(t, 1400, norm600, norm1400)}`);
                    }
                    
                    for (let mmr = 100; mmr <= 2200; mmr++) {
                        let gspCalc = calculateGSP(t, mmr, norm600, norm1400);
                        
                        let diff1 = Math.abs(gspCalc - observedGSPs[0]);
                        let diff2 = Math.abs(gspCalc - observedGSPs[1]);

                        if (diff1 < minObservedDiff1) { minObservedDiff1 = diff1; bestTForGSP1 = t; }
                        if (diff2 < minObservedDiff2) { minObservedDiff2 = diff2; bestTForGSP2 = t; }

                        if (diff1 <= tolerance) matchedObserved.add(0);
                        if (diff2 <= tolerance) matchedObserved.add(1);
                    }

                    if (matchedObserved.size === observedGSPs.length) {
                        matches.push(t);
                    }
                }

                console.log("🏁 Search concluded.");
                console.log(`Closest single approach to Target GSP 1 (${observedGSPs[0]}): Missed by ${minObservedDiff1.toFixed(4)} at T=${bestTForGSP1}`);
                console.log(`Closest single approach to Target GSP 2 (${observedGSPs[1]}): Missed by ${minObservedDiff2.toFixed(4)} at T=${bestTForGSP2}`);

                if (matches.length === 0) {
                    resultsDiv.innerHTML = `<span class="error">No matching curves found within range. Check your browser console (F12) for detailed data.</span>`;
                    return;
                }

                let htmlOutput = `<h3>Found ${matches.length} Match(es):</h3>`;
                matches.forEach(t => {
                    htmlOutput += `<div class="match-card">
                        <strong>👉 Match Found at t = ${t}</strong> <span style="color: var(--text-muted); font-size:0.9rem; margin-left:8px;">(Distance from 2000: ${t - startT})</span>
                    </div>`;
                });

                let targetT = matches[0];
                let eliteGSP = calculateGSP(targetT, 1142, norm600, norm1400);

                htmlOutput += `<div class="elite-card">
                    ✨ Elite Smash Entry Point (MMR=1142):
                    <span>GSP: ${Number(eliteGSP.toFixed(0)).toLocaleString()}</span>
                </div>`;

                htmlOutput += `<h4>Generated GSP values for t = ${targetT}:</h4><textarea readonly>`;
                for (let mmr = 2200; mmr >= 100; mmr--) {
                    htmlOutput += `MMR=${mmr}: GSP=${calculateGSP(targetT, mmr, norm600, norm1400).toFixed(2)}\n`;
                }
                htmlOutput += `</textarea>`;

                resultsDiv.innerHTML = htmlOutput;
            }, 50);
        });
    </script>
</body>
</html>
