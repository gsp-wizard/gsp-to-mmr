<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP to MMR</title>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #26262b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: #374151;
            --elite-gold: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 0 20px; 
            color: var(--text-main); 
            background-color: var(--bg-primary);
            line-height: 1.5;
        }

        h2 { font-size: 1.75rem; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        label { display: block; margin-top: 1.25rem; font-weight: 500; font-size: 0.875rem; color: var(--text-main); }
        
        input { 
            width: 100%; 
            padding: 10px 14px; 
            margin-top: 6px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            background-color: var(--bg-secondary);
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            margin-top: 24px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.15s ease;
        }
        button:hover { background: var(--accent-hover); }
        
        #results { 
            margin-top: 30px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
            background: var(--bg-secondary); 
            border: 1px solid var(--border); 
        }
        
        h3, h4 { margin-top: 0; }

        .match-card { 
            border-left: 4px solid var(--success); 
            padding: 10px 0 10px 15px; 
            margin-bottom: 15px; 
            background: var(--bg-tertiary);
            border-radius: 0 8px 8px 0;
        }

        .elite-card {
            border-left: 4px solid var(--elite-gold);
            padding: 12px 15px;
            margin: 20px 0;
            background: #2e2516;
            border-radius: 0 8px 8px 0;
            font-weight: 600;
        }
        .elite-card span {
            color: var(--elite-gold);
            font-size: 1.15rem;
            display: block;
            margin-top: 2px;
        }

        .error { color: var(--error); font-weight: 600; }
        
        textarea { 
            width: 100%; 
            height: 250px; 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
            background-color: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h2>GSP to MMR</h2>
    <p>Enter <em>exact</em> current gsp values of two characters.</p>

    <label for="gsp1">Observed GSP 1:</label>
    <input type="number" id="gsp1" value="16147639">

    <label for="gsp2">Observed GSP 2:</label>
    <input type="number" id="gsp2" value="16216751">

    <button type="button" id="searchBtn">Find Matching GSP Curve</button>

    <div id="results"></div>

    <script>
        // Standard normal cumulative distribution function (approximation of NORM.DIST)
        function stdNormCDF(x) {
            const t = 1 / (1 + 0.2316419 * Math.abs(x));
            const d = 0.39894228 * Math.exp(-x * x / 2);
            const p = d * t * (0.31938153 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
            return x >= 0 ? 1 - p : p;
        }

        function normCDF(x, mean, stdDev) {
            return stdNormCDF((x - mean) / stdDev);
        }

        function calculateGSP(t, mmr, norm600, norm1400) {
            const baseVal = 1995587;
            const tMod = Math.floor((t - 481) / 49);
            
            if (mmr <= 599) {
                const gsp600 = baseVal + (16058300 + 100 * t - baseVal) * norm600;
                const slopeB = 248.831 + tMod * 0.07619047619;
                return gsp600 - (600 - mmr) * slopeB;
            } else if (mmr >= 1401) {
                const gsp1400 = baseVal + (16058300 + 100 * t - baseVal) * norm1400;
                const slopeT = 220.605 + tMod * 0.0670995671;
                return gsp1400 + (mmr - 1400) * slopeT;
            } else {
                const normDist = normCDF(mmr, 1000, 110);
                return baseVal + (16058300 + 100 * t - baseVal) * normDist;
            }
        }
